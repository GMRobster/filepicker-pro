name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ZIP
        run: |
          cd ..
          zip -r filepicker-pro.zip filepicker-pro/ \
            --exclude "*.git*" \
            --exclude "*/.github/*"
          mv filepicker-pro.zip filepicker-pro/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            filepicker-pro.zip
          generate_release_notes: true
